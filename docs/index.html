<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem World | We have moved!</title>

    <meta http-equiv="refresh" content="5;url=https://totemworld.web.app">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }

        .logo {
            width: 150px; margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 700; }

        p {
            color: #94a3b8; margin-bottom: 40px;
            font-size: 1.1rem; line-height: 1.5;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white; text-decoration: none;
            padding: 15px 35px; border-radius: 50px;
            font-weight: bold; font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<img src="https://totemworld.web.app/img/totemworld_logo.png" alt="Totem World Logo" class="logo" onerror="this.style.display='none'">

<h1 id="title">We have moved!</h1>
<p id="message">We are upgrading our infrastructure.<br>You will be redirected to our new official website in a few seconds...</p>

<a href="https://totemworld.web.app" class="btn" id="btn-text">Go to the new website now</a>

<script>
    // 1. DICCIONARIO MULTILINGÜE
    const translations = {
        en: { // Default
            title: "We have moved!",
            message: "We are upgrading our infrastructure.<br>You will be redirected to our new official website in a few seconds...",
            btn: "Go to the new website now"
        },
        es: {
            title: "¡Nos hemos mudado!",
            message: "Estamos mejorando nuestra infraestructura.<br>Serás redirigido a nuestra nueva web oficial en unos segundos...",
            btn: "Ir a la nueva web ahora"
        },
        fr: {
            title: "Nous avons déménagé !",
            message: "Nous améliorons notre infrastructure.<br>Vous serez redirigé vers notre nouveau site officiel dans quelques secondes...",
            btn: "Aller sur le nouveau site maintenant"
        },
        de: {
            title: "Wir sind umgezogen!",
            message: "Wir verbessern unsere Infrastruktur.<br>Sie werden in wenigen Sekunden auf unsere neue offizielle Website weitergeleitet...",
            btn: "Jetzt zur neuen Website gehen"
        },
        pt: {
            title: "Nós mudamos!",
            message: "Estamos melhorando nossa infraestrutura.<br>Você será redirecionado para nosso novo site oficial em alguns segundos...",
            btn: "Ir para o novo site agora"
        },
        it: {
            title: "Ci siamo trasferiti!",
            message: "Stiamo migliorando la nostra infrastruttura.<br>Verrai reindirizzato al nostro nuovo sito ufficiale tra pochi secondi...",
            btn: "Vai al nuovo sito ora"
        }
    };

    // 2. DETECCIÓN DE IDIOMA DEL NAVEGADOR
    const browserLang = navigator.language || navigator.userLanguage;
    const shortLang = browserLang.split('-')[0]; // Extrae 'es', 'fr', etc.

    // Comprobamos si tenemos el idioma del navegador; si no, usamos 'en' (inglés)
    const targetLang = translations[shortLang] ? shortLang : 'en';

    // 3. APLICAR TEXTOS
    document.documentElement.lang = targetLang;
    document.getElementById('title').innerHTML = translations[targetLang].title;
    document.getElementById('message').innerHTML = translations[targetLang].message;
    document.getElementById('btn-text').innerHTML = translations[targetLang].btn;

    // 4. REDIRECCIÓN POR JAVASCRIPT (Fallback al meta tag)
    // CAMBIA LA URL AQUÍ TAMBIÉN
    setTimeout(function() {
        window.location.href = "https://totemworld.web.app";
    }, 5000);
</script>

</body>
</html>
